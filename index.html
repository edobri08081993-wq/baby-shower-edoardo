<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower Edoardo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #0d1b2a, #1b263b);
  color: white;
  text-align: center;
  min-height: 100vh;
  padding: 20px;
  overflow-x: hidden;
}
.container {
  max-width: 500px;
  margin: 0 auto;
  background: rgba(0,0,0,0.3);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}
.emoji { font-size: 70px; margin: 20px 0; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
h1 { font-size: 40px; color: #ffd166; margin: 15px 0; }
h2 { font-size: 18px; letter-spacing: 2px; margin: 10px 0; }
.quote { font-style: italic; color: #e0e1dd; margin: 20px 0; font-size: 16px; }
.info { margin: 10px 0; font-size: 14px; }
#countdown { color: #ffd166; font-weight: bold; margin: 15px 0; font-size: 16px; }
.button-container { margin: 30px 0; }
a {
  display: block;
  margin: 12px auto;
  padding: 12px;
  width: 90%;
  max-width: 300px;
  background: #ffd166;
  color: #0d1b2a;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  transition: 0.3s;
  cursor: pointer;
}
a:hover { background: #ffed4e; transform: scale(1.05); }
canvas { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="emoji">👶</div>
  
  <h2>✨ ESTÁS INVITADO ✨</h2>
  <h1>Baby Shower</h1>
  <h1>Edoardo</h1>
  
  <p class="quote">"Lo esencial está por llegar y nuestros corazones ya lo esperan con amor."</p>
  
  <div class="info">📅 12 de septiembre del 2026</div>
  <div class="info">🕒 15:00 horas</div>
  
  <div id="countdown">⏳ Cargando...</div>
  
  <div class="button-container">
    <a href="https://maps.app.goo.gl/QeCuu6ML22GzdPev7" target="_blank">📍 Ver ubicación</a>
    <a href="https://mesaderegalos.liverpool.com.mx/milistaderegalos/51966086" target="_blank">🎁 Mesa de regalos</a>
  </div>
  
  <p class="quote">"Lo esencial es invisible a los ojos, pero visible en el corazón"</p>
</div>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
let target = new Date("Sep 12, 2026 15:00:00").getTime();
setInterval(() => {
  let now = new Date().getTime();
  let diff = target - now;
  let d = Math.floor(diff / (1000*60*60*24));
  let h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  let m = Math.floor((diff % (1000*60*60)) / (1000*60));
  document.getElementById("countdown").innerHTML = `⏳ Faltan ${d} días ${h}h ${m}m`;
}, 1000);
</script>

</body>
</html>
